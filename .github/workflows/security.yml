name: Security checks

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Audit dependencies (critical = blocking, high = warning)
        run: |
          echo "=== Full audit report ==="
          npm audit --audit-level=high 2>&1 || true
          echo ""
          echo "=== Checking for critical vulnerabilities ==="
          npm audit --audit-level=critical

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  build:
    name: Build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-secret
          MAGIC_LINK_SECRET: ci-build-secret

  docker:
    name: Container image scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t customer-hub:ci .
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: customer-hub:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
